const grid=document.getElementById('grid'), chipsEl=document.getElementById('chips'),
      qEl=document.getElementById('q'), countEl=document.getElementById('count'),
      overlay=document.getElementById('overlay'), modal=document.getElementById('modal');
const cats=["Tutte","Friggitrice ad aria","Secondi di carne","Burger & panini","Snack & finger food","Primi","Dolci & colazione","Classici"];
let active="Tutte", query="";

cats.forEach(c=>{const b=document.createElement('button');b.className='chip'+(c==="Tutte"?' on':'');
  b.textContent=c;b.onclick=()=>{active=c;[...chipsEl.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  chipsEl.appendChild(b);});

function match(r){
  if(active==="Friggitrice ad aria" && !r.af) return false;
  if(active!=="Tutte" && active!=="Friggitrice ad aria" && !r.c.includes(active)) return false;
  if(query){const h=(r.t+" "+r.ing+" "+r.c.join(" ")).toLowerCase();if(!h.includes(query))return false;}
  return true;
}
function render(){
  const list=R.filter(match);
  countEl.textContent=list.length+" ricette"+(active!=="Tutte"?" Â· "+active:"");
  grid.innerHTML="";
  list.forEach(r=>{
    const card=document.createElement('div');card.className='card';
    const tags=[...(r.af?['<span class="tag af">â˜… Friggitrice ad aria</span>']:[]),
                '<span class="tag">'+r.c[0]+'</span>'].join('');
    card.innerHTML=`<img class="thumb" loading="lazy" src="immagini/${r.img}" alt="${r.t}">
      <div class="card-b"><div class="tags">${tags}</div><h3>${r.t}</h3>
      <div class="meta"><span><b>${r.kcal}</b> kcal</span><span><b>${r.p}</b> g prot</span></div>
      <div class="src">fonte: ${r.sn}</div></div>`;
    card.onclick=()=>openModal(r);
    grid.appendChild(card);
  });
}
function openModal(r){
  const tags=[...(r.af?['<span class="tag af">â˜… Friggitrice ad aria</span>']:[]),
              ...r.c.map(c=>'<span class="tag">'+c+'</span>')].join('');
  modal.innerHTML=`<button class="x" onclick="closeModal()" aria-label="Chiudi">Ã—</button>
    <img src="immagini/${r.img}" alt="${r.t}">
    <div class="modal-b">
      <div class="tags" style="margin-bottom:8px">${tags}</div>
      <h2>${r.t}</h2>
      <div class="meta" style="font-size:15px"><span><b>${r.kcal}</b> kcal</span><span><b>${r.p}</b> g proteine</span></div>
      <span class="cook">${r.cook}</span>
      <div class="sec"><h4>Ingredienti</h4><p>${r.ing}</p></div>
      <div class="sec"><h4>Procedimento</h4><p>${r.st}</p></div>
      ${r.tip?`<div class="tipbox"><b>Per te ðŸ’¡</b> ${r.tip}</div>`:''}
      <div class="sec"><a class="srclink" href="${r.src}" target="_blank" rel="noopener">Apri la ricetta originale su ${r.sn} â†’</a></div>
    </div>`;
  overlay.classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){overlay.classList.remove('open');document.body.style.overflow='';}
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
qEl.oninput=()=>{query=qEl.value.trim().toLowerCase();render();};
render();
</script>
